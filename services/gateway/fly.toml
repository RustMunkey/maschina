app            = "maschina-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  GATEWAY_PORT = "8080"
  NODE_ENV     = "production"
  RUST_LOG     = "info"

# All secrets injected via: fly secrets set JWT_SECRET=... API_URL=... etc.
# Required secrets: JWT_SECRET, API_URL, REALTIME_URL, NATS_URL

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 400

[[vm]]
  size   = "shared-cpu-2x"
  memory = "512mb"

[[metrics]]
  port = 9091
  path = "/metrics"
