app            = "maschina-realtime"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  REALTIME_PORT = "4000"
  NODE_ENV      = "production"
  RUST_LOG      = "info"

# Required secrets: NATS_URL, JWT_SECRET

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  # WebSocket connections are long-lived — raise timeouts accordingly
  [http_service.concurrency]
    type       = "connections"
    hard_limit = 10000
    soft_limit = 8000

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[[metrics]]
  port = 9091
  path = "/metrics"
