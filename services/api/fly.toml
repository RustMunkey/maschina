app            = "maschina-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "3000"
  NODE_ENV = "production"

# Required secrets: DATABASE_URL, REDIS_URL, NATS_URL, JWT_SECRET,
#                   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
#                   RESEND_API_KEY, APP_URL, MEILISEARCH_URL,
#                   MEILISEARCH_MASTER_KEY, QDRANT_URL, TEMPORAL_ADDRESS

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 1
  processes            = ["app"]

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size   = "shared-cpu-2x"
  memory = "512mb"

[[metrics]]
  port = 9091
  path = "/metrics"
