name: Maschina

options:
  bundleIdPrefix: io.maschina
  createIntermediateGroups: true
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""

targets:
  Maschina:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Maschina
    info:
      path: Maschina/Info.plist
      properties:
        CFBundleDisplayName: Maschina
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.0.1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.maschina.ios
    dependencies:
      - target: MaschinaWatch
        embed: true

  MaschinaWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: MaschinaWatch
    info:
      path: MaschinaWatch/Info.plist
      properties:
        CFBundleDisplayName: Maschina
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.0.1"
        WKCompanionAppBundleIdentifier: io.maschina.ios
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.maschina.ios.watchkitapp
