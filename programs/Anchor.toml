[features]
seeds = false
skip-lint = false

[workspace]
members = ["settlement"]

# Placeholder IDs — replaced with real addresses after `anchor deploy`.
# Run: anchor deploy --provider.cluster devnet
# Then paste the program IDs printed by the deploy command below.

[programs.localnet]
settlement = "DysEiPCWKkcMUemm1YHftCQv2UVH3JvDJsdAGbyBW4Md"

[programs.devnet]
settlement = "DysEiPCWKkcMUemm1YHftCQv2UVH3JvDJsdAGbyBW4Md"

[registry]
url = "https://api.apr.dev"

[provider]
# Switch between localnet and devnet:
#   anchor build && anchor deploy                          (localnet)
#   anchor build && anchor deploy --provider.cluster devnet (devnet)
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
