[package]
name = "maschina-code"
version = "0.0.0"
edition = "2021"

[[bin]]
name = "maschina-code"
path = "src/main.rs"

[dependencies]
# Async
tokio = { version = "1", features = ["full"] }
# CLI framework
clap = { version = "4", features = ["derive", "env"] }
# Terminal / TUI
ratatui = "0.29"
crossterm = "0.28"
# Code generation / templating
tera = "1"
# File system watching
notify = "7"
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
# HTTP
reqwest = { version = "0.13", features = ["json", "rustls-tls"] }
# Error handling
anyhow = "1"
thiserror = "1"
