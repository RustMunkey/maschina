[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maschina-ml"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  # Core ML
  "torch>=2.5",
  "numpy>=2.1",
  "scikit-learn>=1.5",
  "pandas>=2.2",
  # Reinforcement learning (agent evolution)
  "gymnasium>=1.0",
  "stable-baselines3>=2.3",
  # Hyperparameter optimization (strategy tuning)
  "optuna>=4.0",
  # Experiment tracking / model versioning
  "mlflow>=2.18",
  # LLM / transformers
  "transformers>=4.46",
  "tokenizers>=0.20",
  # Utilities
  "scipy>=1.14",
  "matplotlib>=3.9",
  "tqdm>=4.67",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-cov>=6.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/maschina_ml"]
