[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maschina-runtime"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
  # API layer
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic>=2.9",
  "pydantic-settings>=2.6",
  # HTTP
  "httpx>=0.28",
  # AI / LLM
  "anthropic>=0.40",
  "langchain>=0.3",
  "langchain-anthropic>=0.3",
  # Data
  "numpy>=2.1",
  "pandas>=2.2",
  # Messaging / queuing
  "redis>=5.2",
  "celery[redis]>=5.4",
  # Observability
  "structlog>=24.4",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "pytest-cov>=6.0",
  "httpx>=0.28",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/maschina_runtime"]
