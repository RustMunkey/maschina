[package]
name = "maschina-cli"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "maschina"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive", "env"] }
inquire = "0.7"
ratatui = "0.29"
crossterm = "0.28"
console = "0.15"
indicatif = "0.17"
colored = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
dirs = "6"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
thiserror = "1"
