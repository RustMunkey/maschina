[package]
name = "maschina-cli"
version = "0.1.0"
edition = "2021"
description = "The Maschina CLI — manage agents, nodes, keys, and usage from the terminal"
homepage = "https://maschina.ai"
repository = "https://github.com/RustMunkey/maschina"
license = "LicenseRef-Proprietary"

[[bin]]
name = "maschina"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive", "env"] }
inquire = "0.7"
ratatui = "0.29"
crossterm = "0.28"
console = "0.15"
indicatif = "0.17"
colored = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
dirs = "5"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
thiserror = "1"

# Node binary deps
sysinfo = "0.32"
async-nats = "0.38"
ed25519-dalek = { version = "2", features = ["rand_core"] }
rand = "0.8"
base64 = "0.22"
hex = "0.4"
futures = "0.3"
