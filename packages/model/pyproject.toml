[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "maschina-model"
version = "0.0.0"
description = "Maschina fine-tuned model — training, evaluation, and inference"
requires-python = ">=3.12"
dependencies = [
  "torch>=2.3",
  "transformers>=4.44",
  "peft>=0.12",           # LoRA / QLoRA fine-tuning
  "trl>=0.9",             # SFT / RLHF / DPO trainers
  "datasets>=2.20",       # HuggingFace datasets
  "accelerate>=0.31",     # multi-GPU / mixed precision
  "bitsandbytes>=0.43",   # 4-bit / 8-bit quantization
  "mlflow>=2.14",         # experiment tracking
  "evaluate>=0.4",        # metrics
  "sentencepiece>=0.2",   # GLM-4 tokenizer
  "einops>=0.8",
  "pydantic>=2.7",
  "structlog>=24.2",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
]

[tool.hatch.build.targets.wheel]
packages = ["src/maschina_model"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-p no:langsmith"
