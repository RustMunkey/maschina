[package]
name = "maschina-sdk"
version = "0.0.0"
edition = "2021"


[lib]
name = "maschina_sdk"

[dependencies]
# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# HTTP client
reqwest = { version = "0.12", features = ["json"] }
# Async
tokio = { version = "1", features = ["full"] }
# Error handling
thiserror = "1"
# IDs
uuid = { version = "1", features = ["v4", "serde"] }
# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
mockito = "1"
