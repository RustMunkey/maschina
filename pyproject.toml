[tool.pytest.ini_options]
testpaths = [
  "packages/runtime",
  "packages/agents",
  "packages/ml",
  "packages/risk",
  "packages/sdk/python",
  "packages/model",
  "services/worker",
]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["maschina"]
