# NATS server configuration — Maschina
# Loaded when certs exist. Falls back to plain nats:// without this file.

port: 4222
monitor_port: 8222

# JetStream
jetstream {
  store_dir: /data
}

# TLS — requires certs generated by scripts/gen-nats-certs.sh
tls {
  cert_file:  /etc/nats/certs/server.pem
  key_file:   /etc/nats/certs/server-key.pem
  ca_file:    /etc/nats/certs/ca.pem
  verify:     false  # clients don't need a cert, only server authenticates
  timeout:    10
}
