apiVersion: 1

groups:
  - orgId: 1
    name: Infrastructure
    folder: Maschina
    interval: 1m
    rules:
      # Fires when any Prometheus scrape target has been down for 2 minutes
      - uid: exporter-down
        title: Exporter Down
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: up == 0
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
              expression: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "{{ $labels.job }} exporter is down on {{ $labels.instance }}"
        labels:
          severity: critical

      # Fires when disk usage on any mount exceeds 85%
      - uid: disk-high
        title: Disk Usage High
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
                / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"}) * 100)
              instant: true
              refId: A
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator: { params: [85], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
              expression: A
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Disk at {{ $values.A.Value | printf \"%.0f\" }}% on root"
        labels:
          severity: warning
