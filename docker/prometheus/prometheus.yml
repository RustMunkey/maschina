global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Host system metrics
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # PostgreSQL metrics
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis metrics
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # NATS monitoring (built-in HTTP, not Prometheus format — used for up/down only)
  - job_name: nats
    metrics_path: /metrics
    static_configs:
      - targets: ['nats-exporter:7777']
