name: maschina

# Full backend stack — builds all 6 services from their Dockerfiles.
# Run alongside the base compose file for a complete local environment.
#
# Usage: make services-up
# Which runs: docker compose -f docker/docker-compose.yml -f docker/docker-compose.services.yml up -d --build
#
# Services talk to each other via Docker service names (not localhost).
# Env vars load from .env in the repo root — copy .env.example and fill in secrets.

services:

  # ─── API (TypeScript / Hono) ──────────────────────────────────────────────
  api:
    image: ghcr.io/rustmunkey/maschina-api:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: maschina-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    env_file: ../.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-maschina}:${POSTGRES_PASSWORD:-maschina}@postgres:5432/${POSTGRES_DB:-maschina}
      REDIS_URL: redis://redis:6379
      NATS_URL: tls://nats:4222
      NATS_CA_CERT: /etc/nats/certs/ca.pem
      NODE_EXTRA_CA_CERTS: /etc/nats/certs/ca.pem
      OTEL_ENABLED: "false"
    volumes:
      - ./nats/certs:/etc/nats/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      meilisearch:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - maschina-internal

  # ─── Gateway (Rust / Axum) ────────────────────────────────────────────────
  gateway:
    image: ghcr.io/rustmunkey/maschina-gateway:${IMAGE_TAG:-latest}
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    container_name: maschina-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    env_file: ../.env
    environment:
      PORT: "8080"
      API_BASE_URL: http://api:3000
      REALTIME_BASE_URL: http://realtime:4000
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/8080' && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - maschina-internal

  # ─── Realtime (Rust / Axum) ───────────────────────────────────────────────
  realtime:
    image: ghcr.io/rustmunkey/maschina-realtime:${IMAGE_TAG:-latest}
    build:
      context: ../services/realtime
      dockerfile: Dockerfile
    container_name: maschina-realtime
    restart: unless-stopped
    ports:
      - "${REALTIME_PORT:-4000}:4000"
    env_file: ../.env
    environment:
      PORT: "4000"
      NATS_URL: tls://nats:4222
      NATS_CA_CERT: /etc/nats/certs/ca.pem
    volumes:
      - ./nats/certs:/etc/nats/certs:ro
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/4000' && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - maschina-internal

  # ─── Daemon (Rust) ────────────────────────────────────────────────────────
  daemon:
    image: ghcr.io/rustmunkey/maschina-daemon:${IMAGE_TAG:-latest}
    build:
      context: ../services/daemon
      dockerfile: Dockerfile
    container_name: maschina-daemon
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maschina}:${POSTGRES_PASSWORD:-maschina}@postgres:5432/${POSTGRES_DB:-maschina}
      REDIS_URL: redis://redis:6379
      NATS_URL: tls://nats:4222
      NATS_CA_CERT: /etc/nats/certs/ca.pem
      RUNTIME_URL: http://runtime:8001
      REALTIME_URL: http://realtime:4000
      API_URL: http://api:3000
      CHAIN_ENABLED: "false"
    volumes:
      - ./nats/certs:/etc/nats/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      runtime:
        condition: service_started
    networks:
      - maschina-internal

  # ─── Runtime (Python / FastAPI) ───────────────────────────────────────────
  runtime:
    image: ghcr.io/rustmunkey/maschina-runtime:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/runtime/Dockerfile
    container_name: maschina-runtime
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RUNTIME_PORT:-8001}:8001"
    env_file: ../.env
    environment:
      PORT: "8001"
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host-gateway:11434/v1
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" 2>/dev/null && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - maschina-internal

  # ─── Worker (Python — NATS consumer + Temporal worker) ────────────────────
  worker:
    image: ghcr.io/rustmunkey/maschina-worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    container_name: maschina-worker
    restart: unless-stopped
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maschina}:${POSTGRES_PASSWORD:-maschina}@postgres:5432/${POSTGRES_DB:-maschina}
      NATS_URL: tls://nats:4222
      NATS_CA_CERT: /etc/nats/certs/ca.pem
      TEMPORAL_URL: temporal:7233
      RUNTIME_URL: http://runtime:8001
    volumes:
      - ./nats/certs:/etc/nats/certs:ro
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      temporal:
        condition: service_started
      runtime:
        condition: service_started
    networks:
      - maschina-internal

networks:
  maschina-internal:
