name: maschina

services:
  postgres:
    image: postgres:17-alpine
    container_name: maschina-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maschina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maschina}
      POSTGRES_DB: ${POSTGRES_DB:-maschina}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maschina}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maschina-internal

  redis:
    image: redis:7-alpine
    container_name: maschina-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maschina-internal

  nats:
    image: nats:2.10-alpine
    container_name: maschina-nats
    restart: unless-stopped
    # Use TLS config when certs exist, plain JetStream otherwise
    command: >
      sh -c "
        if [ -f /etc/nats/certs/server.pem ]; then
          exec nats-server -c /etc/nats/nats.conf
        else
          exec nats-server -js -sd /data -m 8222
        fi
      "
    ports:
      - "127.0.0.1:${NATS_PORT:-4222}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats_data:/data
      - ./nats/nats.conf:/etc/nats/nats.conf:ro
      - ./nats/certs:/etc/nats/certs:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maschina-internal

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: maschina-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterkey-change-in-production}
    ports:
      - "127.0.0.1:${MEILI_PORT:-7700}:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - maschina-internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: maschina-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat /dev/null > /dev/tcp/localhost/6333' && exit 0 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - maschina-internal

  temporal:
    image: temporalio/auto-setup:1.27.0
    container_name: maschina-temporal
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-maschina}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-maschina}
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat /dev/null > /dev/tcp/localhost/7233' && exit 0 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 60s
    networks:
      - maschina-internal

  temporal-ui:
    image: temporalio/ui:latest
    container_name: maschina-temporal-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:${TEMPORAL_UI_PORT:-8088}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal
    networks:
      - maschina-internal

volumes:
  postgres_data:
  redis_data:
  nats_data:
  meilisearch_data:
  qdrant_data:

networks:
  maschina-internal:
    driver: bridge
