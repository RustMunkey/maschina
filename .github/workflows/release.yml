name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  # ── Build CLI binaries for all platforms ──────────────────────────────────

  build-cli:
    name: Build CLI — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-cli
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-cli
            archive: tar.gz

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: maschina-cli
            archive: tar.gz

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: maschina-cli
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: maschina-cli.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2

      - name: Build (cross — Linux)
        if: contains(matrix.target, 'linux')
        working-directory: packages/cli
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo — macOS / Windows)
        if: "!contains(matrix.target, 'linux')"
        working-directory: packages/cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf maschina-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          echo "ASSET=target/${{ matrix.target }}/release/maschina-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a maschina-cli-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.binary }}
          echo "ASSET=target/${{ matrix.target }}/release/maschina-cli-${{ github.ref_name }}-${{ matrix.target }}.zip" >> $GITHUB_ENV
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Build code (TUI scaffold) binaries ───────────────────────────────────

  build-code:
    name: Build code — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-code
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-code
            archive: tar.gz

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: maschina-code
            archive: tar.gz

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: maschina-code
            archive: tar.gz

          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: maschina-code.exe
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2

      - name: Build (cross — Linux)
        if: contains(matrix.target, 'linux')
        working-directory: packages/code
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo — macOS / Windows)
        if: "!contains(matrix.target, 'linux')"
        working-directory: packages/code
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf maschina-code-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          echo "ASSET=target/${{ matrix.target }}/release/maschina-code-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a maschina-code-${{ github.ref_name }}-${{ matrix.target }}.zip ${{ matrix.binary }}
          echo "ASSET=target/${{ matrix.target }}/release/maschina-code-${{ github.ref_name }}-${{ matrix.target }}.zip" >> $GITHUB_ENV
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: code-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Build node binaries ───────────────────────────────────────────────────

  build-node:
    name: Build node — ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-node
            archive: tar.gz

          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            binary: maschina-node
            archive: tar.gz

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: maschina-node
            archive: tar.gz

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: maschina-node
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2

      - name: Build (cross — Linux)
        if: contains(matrix.target, 'linux')
        run: cross build --release --target ${{ matrix.target }} -p maschina-node

      - name: Build (cargo — macOS)
        if: "!contains(matrix.target, 'linux')"
        run: cargo build --release --target ${{ matrix.target }} -p maschina-node

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf maschina-node-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          echo "ASSET=target/${{ matrix.target }}/release/maschina-node-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Publish GitHub release with all artifacts ─────────────────────────────

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [build-cli, build-code, build-node]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION=${{ github.ref_name }}
          ENTRY=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Maschina ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/**/*
          generate_release_notes: false

  # ── Build + push agent sandbox Docker image to GHCR ──────────────────────

  publish-docker:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: [publish-release]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push agent sandbox image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/agent-sandbox/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/maschina-agent-sandbox:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/maschina-agent-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish Docker images to GHCR ────────────────────────────────────────
  # Only runs on version tags (v*) — never on commits or PRs.
  # Render can pull these pre-built images for faster deploys.

  publish-docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: services/api/Dockerfile
            context: .
          - service: gateway
            dockerfile: services/gateway/Dockerfile
            context: services/gateway
          - service: realtime
            dockerfile: services/realtime/Dockerfile
            context: services/realtime
          - service: daemon
            dockerfile: services/daemon/Dockerfile
            context: services/daemon
          - service: runtime
            dockerfile: services/runtime/Dockerfile
            context: .
          - service: worker
            dockerfile: services/worker/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/maschina-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
