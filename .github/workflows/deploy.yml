name: Deploy

on:
  push:
    tags: ["v*"]

# Never cancel an in-flight deploy — let it finish or fail cleanly.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → Dell (node 0)
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Ping the Dell webhook if the secret is configured.
      # Set DELL_WEBHOOK_URL in GitHub secrets once Cloudflare Tunnel + domain is live.
      # Until then this step is a no-op and deploy happens via Dell's auto-update timer.
      - name: Trigger deploy
        if: ${{ secrets.DELL_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ secrets.DELL_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}'

      - name: Notify Slack — deployed
        if: ${{ secrets.SLACK_DEPLOY_WEBHOOK != '' }}
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *Maschina ${{ github.ref_name }} deployed* — <${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|Release notes> — by ${{ github.actor }}"
            }
