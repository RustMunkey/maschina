name: Deploy

on:
  push:
    branches: [main]

# Never cancel an in-flight deploy — let it finish or fail cleanly.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Build Docker images ───────────────────────────────────────────────────
  # CI must pass (enforced by branch protection) before this workflow runs.
  # Each service specifies its own build context. Rust services use their
  # service directory (standalone crate); the TS API uses the monorepo root.

  build:
    name: Build — ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: api
            context: .
            dockerfile: services/api/Dockerfile
            fly_app: maschina-api

          - name: gateway
            context: services/gateway
            dockerfile: services/gateway/Dockerfile
            fly_app: maschina-gateway

          - name: realtime
            context: services/realtime
            dockerfile: services/realtime/Dockerfile
            fly_app: maschina-realtime

          - name: daemon
            context: services/daemon
            dockerfile: services/daemon/Dockerfile
            fly_app: maschina-daemon

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rustmunkey/maschina/${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pass the image tag to the deploy job via artifact
      - name: Save image ref
        run: echo "ghcr.io/rustmunkey/maschina/${{ matrix.service.name }}:sha-${{ github.sha }}" > /tmp/image-${{ matrix.service.name }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: image-ref-${{ matrix.service.name }}
          path: /tmp/image-${{ matrix.service.name }}.txt

  # ── Deploy to Fly.io ──────────────────────────────────────────────────────
  # Services deploy sequentially: api first (runs migrations), then the rest.

  deploy-api:
    name: Deploy → api
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - uses: actions/download-artifact@v4
        with:
          name: image-ref-api
          path: /tmp

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          IMAGE=$(cat /tmp/image-api.txt)
          flyctl deploy \
            --app maschina-api \
            --image "$IMAGE" \
            --strategy rolling \
            --wait-timeout 300

      - name: Smoke test
        run: |
          sleep 5
          curl -f https://maschina-api.fly.dev/health
          curl -f https://maschina-api.fly.dev/ready

  deploy-services:
    name: Deploy → ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: deploy-api
    environment: production
    strategy:
      max-parallel: 2
      matrix:
        app: [gateway, realtime, daemon]
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - uses: actions/download-artifact@v4
        with:
          name: image-ref-${{ matrix.app }}
          path: /tmp

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          IMAGE=$(cat /tmp/image-${{ matrix.app }}.txt)
          flyctl deploy \
            --app maschina-${{ matrix.app }} \
            --image "$IMAGE" \
            --strategy rolling \
            --wait-timeout 300
