name: Deploy

on:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → Dell (node 0)
    runs-on: ubuntu-latest
    environment: production
    env:
      DELL_WEBHOOK_URL: ${{ secrets.DELL_WEBHOOK_URL }}
      DISCORD_DEPLOYS_WEBHOOK: ${{ secrets.DISCORD_DEPLOYS_WEBHOOK }}
    steps:
      - name: Notify Discord — deploy started
        if: env.DISCORD_DEPLOYS_WEBHOOK != ''
        run: |
          curl -s -X POST "$DISCORD_DEPLOYS_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Deploying Maschina ${{ github.ref_name }}\",
                \"color\": 16776960,
                \"fields\": [
                  { \"name\": \"By\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"In progress...\", \"inline\": true }
                ]
              }]
            }"

      - name: Trigger Dell deploy
        if: env.DELL_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$DELL_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}'

      - name: Notify Discord — deploy done
        if: env.DISCORD_DEPLOYS_WEBHOOK != ''
        run: |
          curl -s -X POST "$DISCORD_DEPLOYS_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Maschina ${{ github.ref_name }} deployed\",
                \"url\": \"${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}\",
                \"color\": 5763719,
                \"fields\": [
                  { \"name\": \"By\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"Live\", \"inline\": true }
                ]
              }]
            }"
