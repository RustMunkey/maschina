name: Deploy

on:
  push:
    tags: ["v*"]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy → Dell (node 0)
    runs-on: ubuntu-latest
    environment: production
    env:
      DELL_WEBHOOK_URL: ${{ secrets.DELL_WEBHOOK_URL }}
      SLACK_DEPLOY_WEBHOOK: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
    steps:
      - name: Trigger Dell deploy
        if: env.DELL_WEBHOOK_URL != ''
        run: |
          curl -s -X POST "$DELL_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref_name }}","sha":"${{ github.sha }}"}'

      - name: Notify Slack
        if: env.SLACK_DEPLOY_WEBHOOK != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *Maschina ${{ github.ref_name }} deployed* — <${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|Release notes> — by ${{ github.actor }}"
            }
