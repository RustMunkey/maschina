name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.6.1"
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ── TypeScript ────────────────────────────────────────────────────────────

  ts-typecheck:
    name: TS / typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TS packages in dependency order
        run: |
          pnpm --filter @maschina/db build
          pnpm --filter @maschina/auth build
          pnpm --filter @maschina/cache build
          pnpm --filter @maschina/plans build
          pnpm --filter @maschina/events build
          pnpm --filter @maschina/nats build
          pnpm --filter @maschina/jobs build
          pnpm --filter @maschina/telemetry build
          pnpm --filter @maschina/usage build
          pnpm --filter @maschina/billing build
          pnpm --filter @maschina/notifications build
          pnpm --filter @maschina/validation build
          pnpm --filter @maschina/email build

      - run: pnpm typecheck

  ts-lint:
    name: TS / lint (Biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec biome check packages/ services/ --no-errors-on-unmatched

  ts-test:
    name: TS / test (Vitest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: maschina
          POSTGRES_PASSWORD: maschina
          POSTGRES_DB: maschina_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://maschina:maschina@localhost:5432/maschina_test
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
      JWT_SECRET: ci-test-secret-minimum-32-chars-longvalue
    steps:
      - uses: actions/checkout@v4

      # Service containers can't pass command args — start NATS manually with JetStream.
      - name: Start NATS with JetStream
        run: docker run -d --name nats -p 4222:4222 nats:2-alpine -js

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build TS packages in dependency order
        run: |
          pnpm --filter @maschina/db build
          pnpm --filter @maschina/auth build
          pnpm --filter @maschina/cache build
          pnpm --filter @maschina/plans build
          pnpm --filter @maschina/events build
          pnpm --filter @maschina/nats build
          pnpm --filter @maschina/jobs build
          pnpm --filter @maschina/telemetry build
          pnpm --filter @maschina/usage build
          pnpm --filter @maschina/billing build
          pnpm --filter @maschina/notifications build
          pnpm --filter @maschina/validation build
          pnpm --filter @maschina/email build

      - name: Run migrations
        run: pnpm db:migrate

      - run: pnpm test

  # ── Rust ──────────────────────────────────────────────────────────────────
  # Scoped to server-side crates only. Tauri + CLI binaries are built and
  # cross-compiled in release.yml with their own platform runners.

  rust-fmt:
    name: Rust / fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: rustfmt
      - run: cargo fmt -p maschina-gateway -p maschina-daemon -p maschina-realtime -- --check

  rust-clippy:
    name: Rust / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y pkg-config libssl-dev
      - run: >
          cargo clippy
          -p maschina-gateway
          -p maschina-daemon
          -p maschina-realtime
          -- -D warnings

  rust-test:
    name: Rust / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y pkg-config libssl-dev
      - run: cargo test -p maschina-gateway -p maschina-daemon -p maschina-realtime

  rust-build:
    name: Rust / build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get install -y pkg-config libssl-dev
      - run: >
          cargo build --release
          -p maschina-gateway
          -p maschina-daemon
          -p maschina-realtime

  # ── Python ────────────────────────────────────────────────────────────────

  python-lint:
    name: Python / lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check packages/runtime packages/agents packages/risk services/runtime
      - run: ruff format --check packages/runtime packages/agents packages/risk services/runtime

  python-test:
    name: Python / test (Pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Install packages
        run: |
          uv pip install -e packages/runtime --system
          uv pip install -e packages/agents --system
          uv pip install -e packages/risk --system
          uv pip install pytest pytest-asyncio pytest-mock --system
      - run: pytest packages/runtime/tests packages/agents/tests packages/risk/tests -v

  # ── Gate ──────────────────────────────────────────────────────────────────

  ci-pass:
    name: CI passed
    runs-on: ubuntu-latest
    needs:
      - ts-typecheck
      - ts-lint
      - ts-test
      - rust-fmt
      - rust-clippy
      - rust-test
      - rust-build
      - python-lint
      - python-test
    if: always()
    steps:
      - name: Verify all required jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | jq '[.[].result] | map(select(. == "failure" or . == "cancelled")) | length')
          if [ "$failed" -gt "0" ]; then
            echo "One or more required CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
