version: 2
updates:
  # GitHub Actions only — keeps workflow action versions up to date.
  # npm/cargo/pip updates are handled manually to avoid PR spam.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
