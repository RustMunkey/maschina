name: Bug Report
description: Something is broken or behaving incorrectly.
title: "fix: "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Before filing, check [existing issues](https://github.com/RustMunkey/maschina/issues) to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - services/gateway
        - services/api
        - services/daemon
        - services/realtime
        - services/runtime
        - packages/auth
        - packages/billing
        - packages/database
        - packages/plans
        - packages/nats
        - packages/jobs
        - packages/usage
        - packages/email
        - packages/risk
        - packages/runtime (Python)
        - packages/cli
        - packages/code
        - apps/desktop
        - apps/android
        - apps/ios
        - docker / local dev
        - CI/CD
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. POST /agents with payload ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
      description: Paste any relevant logs. Redact secrets before posting.

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Node 22, Rust 1.82, Docker 24, pnpm 9"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help — related PRs, recent changes, etc.
