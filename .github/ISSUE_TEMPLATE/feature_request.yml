name: Feature Request
description: Propose a new feature or improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        For large design changes, open a [Discussion](https://github.com/RustMunkey/maschina/discussions) first to align on approach before filing a feature issue.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent execution
        - Authentication / security
        - Billing / plans
        - Real-time / WebSocket
        - CLI tools
        - Desktop app
        - Android app
        - iOS app
        - API / routes
        - Developer experience
        - Observability
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "Currently, developers have to manually... which causes..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and why did you rule them out?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, related issues, prior art, etc.
